<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17621900775"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-17621900775');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Online Calculator - Simple & Fast</title>
    <meta name="description" content="Free online calculator. Simple math operations in your browser. No download needed.">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px; 
            width: 100%;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 24px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .display { 
            width: 100%; 
            padding: 20px; 
            font-size: 32px; 
            text-align: right; 
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { 
            padding: 20px; 
            font-size: 18px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer;
            background: #f0f0f0;
            transition: all 0.2s;
            font-weight: bold;
        }
        button:hover { background: #e0e0e0; transform: scale(1.05); }
        button.operator { background: #ff6b35; color: white; }
        button.operator:hover { background: #e55a2b; }
        button.equals { background: #4a90e2; color: white; grid-column: span 2; }
        button.equals:hover { background: #3a7bc8; }
        .features { 
            margin-top: 20px; 
            color: #666; 
            font-size: 13px; 
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Free Online Calculator</h1>
        <p class="subtitle">Simple math in your browser.<br>No download. No install. Instant.</p>
        
        <div class="display" id="display">0</div>
        
        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="append('/')" class="operator">÷</button>
            <button onclick="append('*')" class="operator">×</button>
            <button onclick="deleteLast()">⌫</button>
            
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('-')" class="operator">-</button>
            
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('+')" class="operator">+</button>
            
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="calculate()" class="equals" style="grid-row: span 2;">=</button>
            
            <button onclick="append('0')" style="grid-column: span 2;">0</button>
            <button onclick="append('.')">.</button>
        </div>
        
        <div class="features">
            <span>✓ Browser Only</span>
            <span>✓ No Download</span>
            <span>✓ Mobile Friendly</span>
            <span>✓ 100% Free</span>
        </div>
        
        <div class="footer">
            <a href="privacy.html" style="color:#667eea;">Privacy Policy</a> | 
            <a href="about.html" style="color:#667eea;">About</a>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let current = '0';
        
        function update() { display.textContent = current; }
        
        function append(val) { 
            if(current === '0' && val !== '.') current = val;
            else current += val;
            update();
        }
        
        function clearDisplay() { 
            current = '0'; 
            update(); 
        }
        
        function deleteLast() { 
            current = current.length > 1 ? current.slice(0, -1) : '0'; 
            update(); 
        }
        
        function calculate() { 
            try { 
                current = eval(current).toString(); 
            } catch { 
                current = 'Error'; 
            }
            update();
            // GA4事件追踪：记录一次计算完成
            gtag('event', 'calculate', {
                'event_category': 'engagement',
                'event_label': 'calculation_completed'
            });
        }
    </script>
</body>
</html>
